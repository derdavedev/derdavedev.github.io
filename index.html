<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official homepage for DerDaveDev hosting App AdMob declarations and privacy details.">
    <title>Welcome | DerDaveDev</title>
    <!-- Modern Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-glow: rgba(59, 130, 246, 0.12);
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --text-gradient: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            --button-shadow: rgba(59, 130, 246, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 2;
            padding: 2.5rem;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: clamp(3rem, 8vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 10px 30px rgba(59, 130, 246, 0.15));
        }

        .subtitle {
            font-size: 1.125rem;
            color: #94a3b8;
            font-weight: 400;
            max-width: 420px;
            margin-top: -0.75rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem 2.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: #ffffff;
            background: var(--primary-gradient);
            border: none;
            border-radius: 9999px; /* Fully rounded/roundy button edges */
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--button-shadow);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px var(--button-shadow);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px var(--button-shadow);
        }

        /* Subtle reflection shimmer effect on hover */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.25) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            transition: 0.75s;
            opacity: 0;
        }

        .btn:hover::after {
            left: 125%;
            opacity: 1;
            transition: 0.75s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <p class="subtitle">This is the official domain of DerDaveDev. Access AdMob verification information below.</p>
        <a href="https://gist.github.com/DerDaveDev/e4bc8ea32608c6d4ad3d116b4d3d5fc8" target="_blank" rel="noopener noreferrer" id="privacy-policy-btn" class="btn">Privacy Policy</a>
    </div>
</body>
</html>
